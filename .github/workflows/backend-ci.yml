# CI backend : lint (sans --fix), build, tests unitaires, e2e avec PostgreSQL (schéma via synchronize, base éphémère).
name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "release/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lbp_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lbp_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: lbp_e2e
      # Base vide : le schéma est créé à partir des entités (dédié CI uniquement).
      DB_SYNCHRONIZE: "true"
      JWT_SECRET: ci-e2e-jwt-secret-do-not-use-in-production-min-32b
      TYPEORM_LOGGING: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
